- type: entity
  abstract: true
  parent: AirSensorBase
  id: AirSensorVoxBase
  suffix: Vox Atmosphere
  components:
  - type: AtmosMonitor
    gasThresholdPrototypes:
      Oxygen: voxOxygen
      Nitrogen: voxNitrogen
      CarbonDioxide: stationCO2
      Plasma: stationPlasma
      Tritium: stationTritium
      WaterVapor: stationWaterVapor
      Ammonia: stationAmmonia
      NitrousOxide: stationNO
      Frezon: danger
      BZ: stationBZ # Funky atmos - /tg/ gases
      Healium: stationHealium # Funky atmos - /tg/ gases
      Nitrium: voxNitrium # Funky atmos - /tg/ gases
      Pluoxium: stationPluoxium # Funky atmos - /tg/ gases
      Hydrogen: danger # Funky atmos - /tg/ gases
      HyperNoblium: stationHyperNoblium # Funky atmos - /tg/ gases
      ProtoNitrate: danger # Funky atmos - /tg/ gases
      Zauker: danger # Funky atmos - /tg/ gases
      Halon: voxHalon # Funky atmos - /tg/ gases
      Helium: stationHelium # Funky atmos - /tg/ gases
      AntiNoblium: danger # Funky atmos - /tg/ gases

- type: entity
  parent: [AirSensorVoxBase, AirSensor]
  id: AirSensorVox

- type: entity
  parent: [AirSensorVoxBase, GasVentPump]
  id: GasVentPumpVox
  components:
  - type: AtmosPipeLayers # Funky
    alternativePrototypes:
      Primary: GasVentPumpVox
      Secondary: GasVentPumpVoxAlt1
      Tertiary: GasVentPumpVoxAlt2

- type: entity
  parent: [AirSensorVoxBase, GasVentScrubber]
  id: GasVentScrubberVox
  components:
  - type: GasVentScrubber
    wideNet: true # Air alarm with auto mode overrides filters with hardcoded defaults so default to widenet
    filterGases:
    - Oxygen # filter out oxygen as well as regular harmful gases
    - CarbonDioxide
    - Plasma
    - Tritium
    - WaterVapor
    - Ammonia
    - NitrousOxide
    - Frezon
    - BZ # Funky atmos - /tg/ gases
    - Healium # Funky atmos - /tg/ gases
    - Nitrium # Funky atmos - /tg/ gases
    - Halon # Funky atmos - /tg/ gases
    - Hydrogen # Funky atmos - /tg/ gases
    - HyperNoblium # Funky atmos - /tg/ gases
    - ProtoNitrate # Funky atmos - /tg/ gases
    - Zauker # Funky atmos - /tg/ gases
    - Helium # Funky atmos - /tg/ gases
    - AntiNoblium # Funky atmos - /tg/ gases
  - type: AtmosPipeLayers # Funky
    alternativePrototypes:
      Primary: GasVentScrubberVox
      Secondary: GasVentScrubberVoxAlt1
      Tertiary: GasVentScrubberVoxAlt2

# use this to prevent overriding filters with hardcoded defaults
- type: entity
  parent: AirAlarm
  id: AirAlarmVox
  suffix: Vox Atmosphere, auto mode disabled
  components:
  - type: AirAlarm
    autoMode: false
