name: Publish

concurrency:
  group: publish
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Install OS deps
      run: sudo apt-get install -y python3-paramiko python3-lxml

    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Fetch all tags (RobustToolbox)
      run: |
        cd RobustToolbox
        git fetch --all --tags

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: dotnet restore
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging -c Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform win-arm64 --platform linux-x64 --platform linux-arm64 --platform osx-x64 --platform osx-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    # - name: Publish version
    #   run: Tools/publish_multi_request.py
    #   env:
    #     PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    #     GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY }}

  update-changelog:
    name: Publish Changelogs
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Python deps
      run: pip install requests pyyaml

    - name: Publish changelog (Discord)
      continue-on-error: true
      run: python3 Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        DISCORD_CHANGELOG_ROLE_ID: "1477581647464501410"
